name: Diagnose login issue

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Check backend logs and admin table
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} <<'REMOTE_EOF'
          cd /d C:\Users\ginger\qicai\green-worker-management-system

          echo === backend.log tail (200 lines) ===
          powershell -Command "Get-Content backend.log -Tail 200 -ErrorAction SilentlyContinue"

          echo === backend.err tail (100 lines) ===
          powershell -Command "Get-Content backend.err -Tail 100 -ErrorAction SilentlyContinue"

          echo === admin table ===
          mysql -u root -pshanwer666 -e "SELECT id, username, real_name, is_active, deleted FROM qicai_management.admin;" 2>&1

          echo === drivers table (hua xuefang) ===
          mysql -u root -pshanwer666 -e "SELECT id, real_name, is_active, deleted FROM qicai_management.drivers WHERE real_name LIKE '%花雪芳%';" 2>&1
          REMOTE_EOF
