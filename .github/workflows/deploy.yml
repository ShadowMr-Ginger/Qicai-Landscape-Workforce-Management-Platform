name: Deploy to Windows Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deploy package
        run: tar -czf deploy.tar.gz --exclude='.git' --exclude='target' --exclude='node_modules' --exclude='.next' .

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload package to server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" scp \
            -P ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            deploy.tar.gz ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/C:/Users/ginger/qicai/deploy.tar.gz

      - name: Deploy backend on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} <<'REMOTE_EOF'
          cd /d C:\Users\ginger\qicai
          tar -xzf deploy.tar.gz -C .
          cd green-worker-management-system
          mvn clean package -DskipTests
          powershell -Command "Get-NetTCPConnection -LocalPort 8082 -ErrorAction SilentlyContinue | Where-Object { $_.State -eq 'Listen' } | ForEach-Object { Stop-Process -Id $_.OwningProcess -Force -ErrorAction SilentlyContinue }"
          timeout /t 2 /nobreak >nul
          wmic process call create "cmd.exe /c cd /d C:\Users\ginger\qicai\green-worker-management-system && java -jar target\green-worker-management-system-1.0.0-SNAPSHOT.jar --spring.profiles.active=prod"
          REMOTE_EOF
