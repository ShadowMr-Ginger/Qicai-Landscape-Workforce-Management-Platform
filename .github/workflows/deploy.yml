name: Deploy to Ubuntu Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure deploy directory and .env on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p /home/deploy/qicai
            cat > /home/deploy/qicai/.env <<'EOF'
            MYSQL_HOST=localhost
            MYSQL_PORT=3306
            MYSQL_DB=landscape_workforce
            MYSQL_USER=root
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            WX_APP_ID=${{ secrets.WX_APP_ID }}
            WX_APP_SECRET=${{ secrets.WX_APP_SECRET }}
            EOF
            chmod 600 /home/deploy/qicai/.env
            chown ${{ secrets.SSH_USERNAME }}:${{ secrets.SSH_USERNAME }} /home/deploy/qicai/.env

      - name: Pull latest code and deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/deploy/qicai
            if [ ! -d .git ]; then
              git clone https://github.com/ShadowMr-Ginger/Qicai-Landscape-Workforce-Management-Platform.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi
            bash scripts/deploy-server.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Backend port:"
            ss -tlnp | grep ':8081' || netstat -tlnp | grep ':8081' || true
            echo "Frontend port:"
            ss -tlnp | grep ':3001' || netstat -tlnp | grep ':3001' || true
