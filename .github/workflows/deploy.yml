name: Deploy to Ubuntu Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build backend
        run: |
          cd green-worker-management-system
          mvn clean package -DskipTests

      - name: Build frontend
        run: |
          cd landscape-admin-web
          npm ci
          npm run build

      - name: Package deployment artifacts
        run: |
          tar -czf deploy.tar.gz \
            green-worker-management-system/target/green-worker-management-system-1.0.0-SNAPSHOT.jar \
            landscape-admin-web/.next/standalone \
            landscape-admin-web/package.json \
            landscape-admin-web/package-lock.json \
            scripts/deploy-server.sh \
            sql
          ls -lh deploy.tar.gz

      - name: Upload artifacts to server
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: deploy.tar.gz
          target: /home/deploy/qicai/
          overwrite: true

      - name: Ensure .env on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cat > /home/deploy/qicai/.env <<'EOF'
            MYSQL_HOST=localhost
            MYSQL_PORT=3306
            MYSQL_DB=landscape_workforce
            MYSQL_USER=root
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            WX_APP_ID=${{ secrets.WX_APP_ID }}
            WX_APP_SECRET=${{ secrets.WX_APP_SECRET }}
            EOF
            chmod 600 /home/deploy/qicai/.env

      - name: Extract and deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/deploy/qicai
            tar -xzf deploy.tar.gz --overwrite
            bash scripts/deploy-server.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "Backend port:"
            ss -tlnp 2>/dev/null | grep ':8081' || netstat -tlnp 2>/dev/null | grep ':8081' || true
            echo "Frontend port:"
            ss -tlnp 2>/dev/null | grep ':3001' || netstat -tlnp 2>/dev/null | grep ':3001' || true
