# ============================================================
# 生产环境配置
# 适用场景：正式部署、线上运行
# 安全提醒：
#   1. 数据库密码、JWT 密钥、微信密钥必须通过环境变量或配置中心注入
#   2. 禁止将生产密码直接写在此文件中提交到 Git
# ============================================================

spring:
  config:
    activate:
      on-profile: prod

  # MySQL 数据库配置（生产环境建议开启 SSL、使用独立用户）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/landscape_workforce?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${MYSQL_USER:green_user}
    password: ${MYSQL_PASSWORD:}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: GreenHikariPool-Prod

# MyBatis-Plus 配置（生产环境关闭 SQL 日志）
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT 配置（生产环境必须通过环境变量注入密钥）
jwt:
  # 警告：生产环境请通过环境变量或配置中心设置 JWT_SECRET，不要硬编码
  secret: ${JWT_SECRET:}
  # Token 有效期：7 天（毫秒）
  expiration: 604800000

# 微信小程序配置（生产环境真实值）
wx:
  miniapp:
    app-id: ${WX_APP_ID:}
    app-secret: ${WX_APP_SECRET:}

# Knife4j / OpenAPI 文档（生产环境关闭，避免暴露接口细节）
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# 日志配置（生产环境输出到文件，建议接入 ELK）
logging:
  level:
    root: warn
    com.green: info
    org.springframework.security: error
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /var/log/green/app.log
    max-size: 100MB
    max-history: 30
