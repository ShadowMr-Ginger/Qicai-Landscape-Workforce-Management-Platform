# ============================================================
# 绿化工人管理系统 - 主配置文件
# 说明：此文件为总入口，实际配置按环境拆分到 application-dev.yml 和 application-prod.yml
# ============================================================

spring:
  application:
    name: green-worker-management-system

  # 激活的配置文件（默认开发环境，生产环境通过命令行覆盖：--spring.profiles.active=prod）
  profiles:
    active: dev

  # Jackson 日期时间格式
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# 服务器配置
server:
  port: 8081
  # 优雅停机
  shutdown: graceful
  # 强制使用 UTF-8 编码
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

# 日志配置
logging:
  level:
    root: info
    com.green: debug
    org.springframework.security: warn
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"

# 自定义配置（按模块划分，具体值在环境配置中覆盖）
green:
  # 跨域配置（开发环境宽松，生产环境严格）
  cors:
    allowed-origins: "*"

---
# 以下为空占位，实际配置请在 application-dev.yml 或 application-prod.yml 中查看
