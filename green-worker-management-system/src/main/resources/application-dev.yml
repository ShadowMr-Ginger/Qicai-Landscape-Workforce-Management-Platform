# ============================================================
# 开发环境配置
# 适用场景：本地开发、前后端联调
# ============================================================

spring:
  config:
    activate:
      on-profile: dev

  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/landscape_workforce?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: Xjq@020319
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: GreenHikariPool

  # 强制使用 UTF-8 编码（防止 Windows 本地开发环境默认 GBK 导致中文乱码）
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

# 服务器配置
# 开发环境统一使用 8081，与生产/服务器保持一致
server:
  port: 8081

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    # 开启 SQL 日志打印（开发环境）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 驼峰命名自动映射
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（已删除）
      logic-delete-value: 1
      # 逻辑未删除值（未删除）
      logic-not-delete-value: 0
      # ID 生成策略
      id-type: auto
  # Mapper XML 扫描路径（如有自定义 XML）
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT 配置
jwt:
  # 签名密钥（Base64 编码，开发环境随便写一个，生产环境必须更换为强随机密钥）
  # 生成命令：echo -n 'your-secret-key' | base64
  secret: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3OA==
  # Token 有效期：7 天（毫秒）
  expiration: 604800000

# 微信小程序配置（开发环境）
wx:
  miniapp:
    app-id: wx_dev_appid_placeholder
    app-secret: wx_dev_secret_placeholder

#  Knife4j / OpenAPI 文档（开发环境开启）
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs

# 日志级别（开发环境更详细）
logging:
  level:
    com.green.mapper: debug
    org.springframework.jdbc: debug
    com.green.common.backup: debug

# 数据库自动备份配置（开发环境默认关闭，避免本地反复启动时产生大量备份）
green:
  backup:
    enabled: false
    mysqldump-path: mysqldump
    backup-dir: ./backups
    file-prefix: landscape_workforce
    backup-on-startup: false
    scheduled-enabled: false
    cron: "0 0 0/12 * * ?"
    retention: 7d
    extra-options: "--single-transaction --routines --events --triggers"
